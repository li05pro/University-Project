<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 源泉</title>
    <link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css" />
</head>
<body>
    <div class="auth-page">
        <div class="auth-box">
            <div class="auth-header">
                <h1>欢迎回来</h1>
                <p>登录源泉，继续您的知识之旅</p>
            </div>
            
            <form id="loginForm" action="php/auth.php?action=login" method="POST" data-validate>
                <div class="form-group">
                    <label class="form-label">用户名/邮箱</label>
                    <input type="text" name="username" class="form-control" placeholder="请输入用户名或邮箱" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">验证码 <span class="required">*</span></label>
                    <div class="captcha-box">
                        <input type="text" name="captcha" class="form-control" placeholder="请输入验证码 123456" required maxlength="6">
                        <img src="php/captcha.php" alt="验证码" onclick="this.src='php/captcha.php?'+Math.random()" title="点击刷新">
                    </div>
                    <p style="font-size: 12px; color: #7f8c8d; margin-top: 5px;">💡 测试环境验证码固定为：123456</p>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember" value="1">
                        <span>记住我</span>
                    </label>
                    <a href="#" class="forgot-password">忘记密码？</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">立即登录</button>
            </form>
            
            <div class="auth-footer">
                还没有账号？<a href="register.html">立即注册</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
   <script src="js/login.js"></script>
</body>
</html>
