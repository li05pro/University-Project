<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 源泉</title>
    <link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/register.css" />
</head>
<body>
    <div class="auth-page">
        <div class="auth-box">
            <div class="auth-header">
                <h1>创建账号</h1>
                <p>加入源泉，开启知识分享之旅</p>
            </div>
            
            <form id="registerForm" action="php/auth.php?action=register" method="POST" data-validate>
                <div class="form-group">
                    <label class="form-label">用户名 <span class="required">*</span></label>
                    <input type="text" name="username" class="form-control" placeholder="3-20位字母、数字、下划线" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">电子邮箱 <span class="required">*</span></label>
                    <input type="email" name="email" class="form-control" placeholder="请输入有效的邮箱地址" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">昵称 <span class="required">*</span></label>
                    <input type="text" name="nickname" class="form-control" placeholder="2-50个字符" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码 <span class="required">*</span></label>
                    <input type="password" name="password" class="form-control" placeholder="至少6位，包含字母和数字" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">确认密码 <span class="required">*</span></label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="请再次输入密码" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">验证码 <span class="required">*</span></label>
                    <div class="captcha-box">
                        <input type="text" name="captcha" class="form-control" placeholder="请输入验证码 123456" required maxlength="6">
                        <img src="php/captcha.php" alt="验证码" onclick="this.src='php/captcha.php?'+Math.random()" title="点击刷新">
                    </div>
                    <p style="font-size: 12px; color: #7f8c8d; margin-top: 5px;">💡 测试环境验证码固定为：123456</p>
                </div>
                
                <div class="form-group">
                    <label class="agreement">
                        <input type="checkbox" name="agreement" required>
                        <span>我已阅读并同意 <a href="#" target="_blank">《用户协议》</a> 和 <a href="#" target="_blank">《隐私政策》</a></span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">立即注册</button>
            </form>
            
            <div class="auth-footer">
                已有账号？<a href="login.html">立即登录</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
   <script src="js/register.js"> </script>
</body>
</html>
