<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试注册功能</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;
        }
        button { padding: 10px 20px; background: #1abc9c; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #16a085; }
        #result { margin-top: 20px; padding: 15px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>注册功能测试</h1>
    <form id="testForm">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" value="testuser123" required>
        </div>
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" name="email" value="test123@example.com" required>
        </div>
        <div class="form-group">
            <label>昵称</label>
            <input type="text" name="nickname" value="测试用户123" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" value="password123" required>
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" name="confirm_password" value="password123" required>
        </div>
        <div class="form-group">
            <label>验证码</label>
            <input type="text" name="captcha" placeholder="先查看下方验证码" required>
            <div style="margin-top: 10px;">
                <img src="php/captcha.php" alt="验证码" onclick="this.src='php/captcha.php?'+Math.random()" style="cursor: pointer; border: 1px solid #ddd;">
                <small>点击刷新验证码</small>
            </div>
        </div>
        <button type="submit">测试注册</button>
    </form>
    
    <div id="result"></div>

    <script>
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '发送请求中...';
            resultDiv.className = '';
            
            const formData = new FormData(this);
            
            fetch('php/auth.php?action=register', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                console.log('Response status:', response.status);
                return response.text().then(text => {
                    console.log('Raw response:', text);
                    try {
                        return JSON.parse(text);
                    } catch (e) {
                        throw new Error('返回的不是有效JSON: ' + text.substring(0, 200));
                    }
                });
            })
            .then(data => {
                console.log('Parsed data:', data);
                if (data.success) {
                    resultDiv.innerHTML = '<strong>✓ 成功!</strong><br>' + data.message + '<br><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                    resultDiv.className = 'success';
                } else {
                    resultDiv.innerHTML = '<strong>✗ 失败!</strong><br>' + data.message + '<br><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                    resultDiv.className = 'error';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                resultDiv.innerHTML = '<strong>✗ 错误!</strong><br>' + error.message;
                resultDiv.className = 'error';
            });
        });
    </script>
</body>
</html>
