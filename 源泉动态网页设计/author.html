<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作者详情 - 源泉</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .author-header {
            background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%);
            color: white;
            padding: 60px 0;
            margin-bottom: 40px;
        }
        
        .author-profile {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .author-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            object-fit: cover;
        }
        
        .author-info h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .author-bio {
            opacity: 0.9;
            margin-bottom: 15px;
            max-width: 500px;
        }
        
        .author-stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
        }
        
        .author-stat-item {
            text-align: center;
        }
        
        .author-stat-item .number {
            font-size: 24px;
            font-weight: 600;
        }
        
        .author-stat-item .label {
            font-size: 14px;
            opacity: 0.8;
        }
        
        .author-actions {
            display: flex;
            gap: 15px;
        }
        
        .author-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
        }
        
        .articles-section h2 {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e1e8ed;
        }
        
        .author-article-item {
            display: flex;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid #e1e8ed;
        }
        
        .author-article-item:last-child {
            border-bottom: none;
        }
        
        .author-article-thumb {
            width: 200px;
            height: 120px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }
        
        .author-article-content {
            flex: 1;
        }
        
        .author-article-content h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        .author-article-content h3 a {
            color: #2c3e50;
            text-decoration: none;
        }
        
        .author-article-content h3 a:hover {
            color: #1abc9c;
        }
        
        .author-article-summary {
            color: #7f8c8d;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .author-article-meta {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #95a5a6;
        }
        
        .sidebar-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .sidebar-section h3 {
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .join-date {
            color: #7f8c8d;
            font-size: 14px;
        }
        
        .empty-articles {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }
        
        @media (max-width: 768px) {
            .author-profile {
                flex-direction: column;
                text-align: center;
            }
            
            .author-content {
                grid-template-columns: 1fr;
            }
            
            .author-article-item {
                flex-direction: column;
            }
            
            .author-article-thumb {
                width: 100%;
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">
            <a href="index.html">源泉</a>
        </div>
        <ul class="nav-menu">
            <li><a href="index.html">首页</a></li>
            <li><a href="articles.html">资讯</a></li>
            <li><a href="community.html">社区</a></li>
            <li><a href="about.html">关于</a></li>
        </ul>
        <div class="nav-actions">
            <div class="search-box">
                <input type="text" placeholder="搜索..." id="navSearchInput">
                <button onclick="handleNavSearch()">🔍</button>
            </div>
            <div id="authButtons">
                <a href="login.html" class="btn btn-outline">登录</a>
                <a href="register.html" class="btn btn-primary">注册</a>
            </div>
            <div class="user-menu" id="userMenu" style="display: none;">
                <img src="img/avatar-default.jpg" alt="头像" class="user-avatar" id="navUserAvatar">
                <div class="dropdown-menu">
                    <a href="user-center.html">个人中心</a>
                    <a href="#" onclick="logout()">退出登录</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 作者头部信息 -->
    <section class="author-header">
        <div class="container">
            <div class="author-profile">
                <img src="img/avatar-default.jpg" alt="作者头像" class="author-avatar-large" id="authorAvatar">
                <div class="author-info">
                    <h1 id="authorName">加载中...</h1>
                    <p class="author-bio" id="authorBio">暂无简介</p>
                    <div class="author-stats">
                        <div class="author-stat-item">
                            <div class="number" id="authorArticleCount">0</div>
                            <div class="label">文章</div>
                        </div>
                        <div class="author-stat-item">
                            <div class="number" id="authorViewCount">0</div>
                            <div class="label">阅读</div>
                        </div>
                        <div class="author-stat-item">
                            <div class="number" id="authorLikeCount">0</div>
                            <div class="label">获赞</div>
                        </div>
                        <div class="author-stat-item">
                            <div class="number" id="authorFriendCount">0</div>
                            <div class="label">好友</div>
                        </div>
                    </div>
                    <div class="author-actions" id="authorActions">
                        <button class="btn btn-light" id="addFriendBtn" onclick="addAuthorFriend()">+ 加好友</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 作者内容 -->
    <div class="container">
        <div class="author-content">
            <!-- 文章列表 -->
            <section class="articles-section">
                <h2>发布的文章</h2>
                <div id="authorArticles">
                    <div class="loading-text" style="text-align: center; padding: 40px;">加载中...</div>
                </div>
                <div class="pagination" id="articlesPagination"></div>
            </section>

            <!-- 侧边栏 -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>加入时间</h3>
                    <p class="join-date" id="authorJoinDate">--</p>
                </div>
            </aside>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h4>关于源泉</h4>
                <p>源泉是一个专注于知识分享和交流的平台，让每个人都能找到属于自己的知识源泉。</p>
            </div>
            <div class="footer-section">
                <h4>快速链接</h4>
                <ul>
                    <li><a href="about.html">关于我们</a></li>
                    <li><a href="contact.html">联系我们</a></li>
                    <li><a href="privacy.html">隐私政策</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>联系方式</h4>
                <p>邮箱：contact@yuanquan.com</p>
                <p>电话：400-123-4567</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 源泉. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // 获取URL参数
        const urlParams = new URLSearchParams(window.location.search);
        const authorId = urlParams.get('id');
        
        let currentAuthor = null;
        let currentPage = 1;
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            if (!authorId) {
                showError('缺少作者ID参数');
                return;
            }
            
            loadAuthorDetail();
            loadAuthorArticles();
        });
        
        // 加载作者详情
        async function loadAuthorDetail() {
            try {
                const response = await fetch(`php/author_api.php?action=detail&id=${authorId}`);
                const result = await response.json();
                
                if (result.success) {
                    currentAuthor = result.data.author;
                    renderAuthorDetail(currentAuthor);
                } else {
                    showError(result.message || '作者不存在');
                }
            } catch (error) {
                console.error('加载作者详情失败:', error);
                showError('加载失败，请稍后重试');
            }
        }
        
        // 渲染作者详情
        function renderAuthorDetail(author) {
            document.title = `${author.nickname || author.username} - 源泉`;
            
            document.getElementById('authorAvatar').src = author.avatar;
            document.getElementById('authorName').textContent = author.nickname || author.username;
            document.getElementById('authorBio').textContent = author.bio || '暂无简介';
            document.getElementById('authorArticleCount').textContent = author.article_count || 0;
            document.getElementById('authorViewCount').textContent = formatNumber(author.total_views || 0);
            document.getElementById('authorLikeCount').textContent = formatNumber(author.total_likes || 0);
            document.getElementById('authorFriendCount').textContent = author.friend_count || 0;
            document.getElementById('authorJoinDate').textContent = author.join_date || '--';
            
            // 更新按钮状态
            updateFriendButton(author);
        }
        
        // 更新好友按钮状态
        function updateFriendButton(author) {
            const btn = document.getElementById('addFriendBtn');
            const actionsDiv = document.getElementById('authorActions');
            
            if (!Auth.isLoggedIn()) {
                btn.textContent = '+ 加好友';
                btn.onclick = () => {
                    window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
                };
                return;
            }
            
            if (author.is_self) {
                btn.style.display = 'none';
                return;
            }
            
            if (author.is_friend) {
                btn.textContent = '✓ 已是好友';
                btn.disabled = true;
                btn.classList.remove('btn-light');
                btn.classList.add('btn-outline');
            } else if (author.friend_status === 0) {
                btn.textContent = '等待确认';
                btn.disabled = true;
                btn.classList.remove('btn-light');
                btn.classList.add('btn-outline');
            } else {
                btn.textContent = '+ 加好友';
                btn.disabled = false;
                btn.onclick = addAuthorFriend;
            }
        }
        
        // 加载作者文章
        async function loadAuthorArticles(page = 1) {
            currentPage = page;
            
            try {
                const response = await fetch(`php/author_api.php?action=articles&id=${authorId}&page=${page}`);
                const result = await response.json();
                
                if (result.success) {
                    renderAuthorArticles(result.data.articles);
                    renderPagination(result.data.pagination);
                } else {
                    document.getElementById('authorArticles').innerHTML = `
                        <div class="empty-articles">
                            <p>暂无文章</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载文章失败:', error);
                document.getElementById('authorArticles').innerHTML = `
                    <div class="empty-articles">
                        <p>加载失败</p>
                    </div>
                `;
            }
        }
        
        // 渲染作者文章
        function renderAuthorArticles(articles) {
            const container = document.getElementById('authorArticles');
            
            if (!articles || articles.length === 0) {
                container.innerHTML = `
                    <div class="empty-articles">
                        <p>该作者暂无发布的文章</p>
                    </div>
                `;
                return;
            }
            
            const html = articles.map(article => `
                <div class="author-article-item">
                    <img src="${article.cover_image}" alt="${article.title}" class="author-article-thumb">
                    <div class="author-article-content">
                        <h3><a href="article-detail.html?id=${article.article_id}">${article.title}</a></h3>
                        <p class="author-article-summary">${article.summary || '暂无摘要'}</p>
                        <div class="author-article-meta">
                            <span>${article.category_name || '未分类'}</span>
                            <span>👁 ${article.view_count}</span>
                            <span>💬 ${article.comment_count}</span>
                            <span>${article.created_at}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
        }
        
        // 渲染分页
        function renderPagination(pagination) {
            const container = document.getElementById('articlesPagination');
            
            if (pagination.total_pages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            const currentPage = pagination.current_page;
            const totalPages = pagination.total_pages;
            
            // 上一页
            if (currentPage > 1) {
                html += `<a href="javascript:void(0)" onclick="loadAuthorArticles(${currentPage - 1})" class="page-link">上一页</a>`;
            }
            
            // 页码
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            
            if (startPage > 1) {
                html += `<a href="javascript:void(0)" onclick="loadAuthorArticles(1)" class="page-link">1</a>`;
                if (startPage > 2) html += `<span class="page-ellipsis">...</span>`;
            }
            
            for (let i = startPage; i <= endPage; i++) {
                if (i === currentPage) {
                    html += `<span class="page-current">${i}</span>`;
                } else {
                    html += `<a href="javascript:void(0)" onclick="loadAuthorArticles(${i})" class="page-link">${i}</a>`;
                }
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<span class="page-ellipsis">...</span>`;
                html += `<a href="javascript:void(0)" onclick="loadAuthorArticles(${totalPages})" class="page-link">${totalPages}</a>`;
            }
            
            // 下一页
            if (currentPage < totalPages) {
                html += `<a href="javascript:void(0)" onclick="loadAuthorArticles(${currentPage + 1})" class="page-link">下一页</a>`;
            }
            
            container.innerHTML = html;
        }
        
        // 添加作者为好友
        async function addAuthorFriend() {
            if (!Auth.isLoggedIn()) {
                if (typeof showMessage === 'function') {
                    showMessage('请先登录后再添加好友', 'warning');
                }
                window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
                return;
            }
            
            if (!currentAuthor) return;
            
            const btn = document.getElementById('addFriendBtn');
            btn.disabled = true;
            btn.textContent = '发送中...';
            
            try {
                const formData = new FormData();
                formData.append('friend_id', currentAuthor.user_id);
                
                const response = await fetch('php/user.php?action=add_friend', {
                    method: 'POST',
                    body: formData,
                    credentials: 'same-origin'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    btn.textContent = '等待确认';
                    btn.classList.remove('btn-light');
                    btn.classList.add('btn-outline');
                    if (typeof showMessage === 'function') {
                        showMessage('好友请求已发送', 'success');
                    }
                } else {
                    btn.disabled = false;
                    btn.textContent = '+ 加好友';
                    if (typeof showMessage === 'function') {
                        showMessage(result.message || '添加好友失败', 'error');
                    } else {
                        alert(result.message || '添加好友失败');
                    }
                }
            } catch (error) {
                console.error('添加好友失败:', error);
                btn.disabled = false;
                btn.textContent = '+ 加好友';
                if (typeof showMessage === 'function') {
                    showMessage('添加好友失败，请稍后重试', 'error');
                } else {
                    alert('添加好友失败，请稍后重试');
                }
            }
        }
        
        // 格式化数字
        function formatNumber(num) {
            if (num >= 10000) {
                return (num / 10000).toFixed(1) + '万';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'k';
            }
            return num;
        }
        
        // 显示错误
        function showError(message) {
            document.querySelector('.author-header .container').innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <h2 style="margin-bottom: 20px;">${message}</h2>
                    <a href="articles.html" class="btn btn-light">返回文章列表</a>
                </div>
            `;
        }
        
        // 导航栏搜索
        function handleNavSearch() {
            const keyword = document.getElementById('navSearchInput').value.trim();
            if (keyword) {
                window.location.href = `articles.html?keyword=${encodeURIComponent(keyword)}`;
            }
        }
    </script>
</body>
</html>
