<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布资讯 - 源泉</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .publish-page {
            padding: 30px 0;
        }
        .publish-header {
            margin-bottom: 30px;
        }
        .publish-header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .publish-form {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        .cover-upload {
            border: 2px dashed #e1e8ed;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .cover-upload:hover {
            border-color: #1abc9c;
            background: rgba(26, 188, 156, 0.05);
        }
        .cover-upload i {
            font-size: 48px;
            color: #bdc3c7;
            margin-bottom: 15px;
        }
        .cover-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            display: none;
        }
        .editor-toolbar {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: #f8f9fa;
            border: 1px solid #e1e8ed;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
        }
        .editor-toolbar button {
            padding: 5px 10px;
            background: white;
            border: 1px solid #e1e8ed;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .editor-toolbar button:hover {
            background: #1abc9c;
            color: white;
            border-color: #1abc9c;
        }
        .editor-content {
            width: 100%;
            min-height: 400px;
            padding: 15px;
            border: 1px solid #e1e8ed;
            border-radius: 0 0 8px 8px;
            resize: vertical;
            font-size: 14px;
            line-height: 1.8;
        }
        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e1e8ed;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <span>源泉</span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="articles.html">资讯中心</a></li>
                <li><a href="circles.html">交流圈</a></li>
                <li><a href="about.html">关于我们</a></li>
            </ul>
            <div class="nav-right">
                <div class="search-box">
                    <input type="text" placeholder="搜索资讯...">
                    <button type="button">🔍</button>
                </div>
                <div class="user-menu">
                    <a href="login.html" class="btn btn-outline btn-sm">登录</a>
                    <a href="register.html" class="btn btn-primary btn-sm">注册</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="publish-page">
        <div class="container">
            <div class="publish-header">
                <h1>发布资讯</h1>
                <p style="color: #7f8c8d;">分享你的知识和经验，帮助更多的人</p>
            </div>

            <form class="publish-form" id="publishForm" action="php/article.php?action=create" method="POST" enctype="multipart/form-data" data-validate>
                <!-- 标题 -->
                <div class="form-group">
                    <label class="form-label">资讯标题 <span class="required">*</span></label>
                    <input type="text" name="title" class="form-control" placeholder="请输入资讯标题，2-200个字符" required maxlength="200">
                </div>

                <!-- 分类和标签 -->
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">选择分类 <span class="required">*</span></label>
                        <select name="category_id" class="form-control" required>
                            <option value="">请选择分类</option>
                            <option value="1">技术教程</option>
                            <option value="2">经验分享</option>
                            <option value="3">行业动态</option>
                            <option value="4">生活随笔</option>
                            <option value="5">前端开发</option>
                            <option value="6">后端开发</option>
                            <option value="7">数据库</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">标签</label>
                        <input type="text" name="tags" class="form-control" placeholder="多个标签用逗号分隔，如：PHP,MySQL,优化">
                    </div>
                </div>

                <!-- 封面图片 -->
                <div class="form-group">
                    <label class="form-label">封面图片</label>
                    <div class="cover-upload" onclick="document.getElementById('coverInput').click()">
                        <input type="file" id="coverInput" name="cover_image" accept="image/*" style="display: none;" onchange="previewCover(this)">
                        <div id="uploadPlaceholder">
                            <div style="font-size: 48px; margin-bottom: 15px;">📷</div>
                            <p>点击上传封面图片</p>
                            <p style="font-size: 12px; color: #7f8c8d; margin-top: 10px;">支持 JPG、PNG、GIF 格式，最大 5MB</p>
                        </div>
                        <img id="coverPreview" class="cover-preview" alt="封面预览">
                    </div>
                </div>

                <!-- 内容编辑器 -->
                <div class="form-group">
                    <label class="form-label">资讯内容 <span class="required">*</span></label>
                    <div class="editor-toolbar">
                        <button type="button" onclick="insertText('**粗体**')">B</button>
                        <button type="button" onclick="insertText('*斜体*')">I</button>
                        <button type="button" onclick="insertText('# 标题')">H</button>
                        <button type="button" onclick="insertText('```\n代码块\n```')">Code</button>
                        <button type="button" onclick="insertText('- 列表项')">List</button>
                        <button type="button" onclick="insertText('[链接文本](url)')">Link</button>
                    </div>
                    <textarea name="content" class="editor-content" placeholder="请输入资讯内容，支持 Markdown 格式..." required></textarea>
                </div>

                <!-- 操作按钮 -->
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" onclick="saveDraft()">保存草稿</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">立即发布</button>
                </div>
            </form>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>关于源泉</h4>
                    <a href="about.html">平台介绍</a>
                    <a href="about.html">联系我们</a>
                    <a href="about.html">加入我们</a>
                </div>
                <div class="footer-section">
                    <h4>帮助中心</h4>
                    <a href="help.html">使用指南</a>
                    <a href="help.html">常见问题</a>
                    <a href="help.html">意见反馈</a>
                </div>
                <div class="footer-section">
                    <h4>友情链接</h4>
                    <a href="#">技术博客</a>
                    <a href="#">开发者社区</a>
                    <a href="#">开源项目</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 源泉 - 知识分享与交流平台. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/article.js"></script>
    <script>
        // 预览封面图片
        function previewCover(input) {
            const preview = document.getElementById('coverPreview');
            const placeholder = document.getElementById('uploadPlaceholder');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        // 插入文本到编辑器
        function insertText(text) {
            const textarea = document.querySelector('.editor-content');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const value = textarea.value;
            
            textarea.value = value.substring(0, start) + text + value.substring(end);
            textarea.focus();
            textarea.selectionStart = textarea.selectionEnd = start + text.length;
        }
        
        // 保存草稿
        function saveDraft() {
            if (!Auth.isLoggedIn()) {
                showMessage('请先登录后再保存草稿', 'warning');
                return;
            }
            
            const form = document.getElementById('publishForm');
            const formData = new FormData(form);
            formData.append('draft', '1');
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn?.textContent;
            
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.textContent = '保存中...';
            }
            
            fetch('php/article.php?action=create', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    showMessage('草稿保存成功！', 'success');
                } else {
                    showMessage(result.message || '保存失败', 'error');
                }
            })
            .catch(error => {
                console.error('保存草稿失败:', error);
                showMessage('网络错误，请稍后重试', 'error');
            })
            .finally(() => {
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            });
        }
    </script>
</body>
</html>
